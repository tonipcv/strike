name: Strike Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC

env:
  STRIKE_VERSION: latest
  RUST_BACKTRACE: 1

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Strike Security
        run: |
          cargo install --path . --locked
      
      - name: Run Strike Security Scan
        id: strike-scan
        run: |
          strike scan \
            --target ${{ github.server_url }}/${{ github.repository }} \
            --output json \
            --output-file strike-results.json \
            --severity high,critical \
            --max-findings 100 \
            --timeout 1800
        continue-on-error: true
      
      - name: Generate HTML Report
        if: always()
        run: |
          strike report \
            --input strike-results.json \
            --format html \
            --output strike-report.html
      
      - name: Generate SARIF Report
        if: always()
        run: |
          strike report \
            --input strike-results.json \
            --format sarif \
            --output strike-results.sarif
      
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: strike-results.sarif
          category: strike-security
      
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strike-security-report
          path: |
            strike-report.html
            strike-results.json
          retention-days: 30
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('strike-results.json', 'utf8'));
            
            const critical = results.findings.filter(f => f.severity === 'Critical').length;
            const high = results.findings.filter(f => f.severity === 'High').length;
            const medium = results.findings.filter(f => f.severity === 'Medium').length;
            const low = results.findings.filter(f => f.severity === 'Low').length;
            
            const comment = `## 🔒 Strike Security Scan Results
            
            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${critical} |
            | 🟠 High | ${high} |
            | 🟡 Medium | ${medium} |
            | 🟢 Low | ${low} |
            
            **Total Findings:** ${results.findings.length}
            **Scan Duration:** ${results.metadata.duration_seconds}s
            
            [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Check Security Threshold
        if: always()
        run: |
          CRITICAL=$(jq '[.findings[] | select(.severity == "Critical")] | length' strike-results.json)
          HIGH=$(jq '[.findings[] | select(.severity == "High")] | length' strike-results.json)
          
          echo "Critical findings: $CRITICAL"
          echo "High findings: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi
          
          if [ "$HIGH" -gt 5 ]; then
            echo "⚠️  Too many high severity findings!"
            exit 1
          fi
          
          echo "✅ Security scan passed!"

  incremental-scan:
    name: Incremental Scan (Changed Files Only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **/*.rs
            **/*.toml
            src/**
      
      - name: Setup Rust
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Install Strike Security
        if: steps.changed-files.outputs.any_changed == 'true'
        run: cargo install --path . --locked
      
      - name: Run Incremental Scan
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
          
          strike scan \
            --incremental \
            --changed-files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --output json \
            --output-file incremental-results.json
      
      - name: Upload Incremental Results
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: incremental-scan-results
          path: incremental-results.json
          retention-days: 7
