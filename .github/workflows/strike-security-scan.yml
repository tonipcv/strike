name: Strike Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC

env:
  STRIKE_VERSION: latest
  RUST_BACKTRACE: 1

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Strike CLI
        run: cargo install --path . --locked

      - name: Run Rust tests
        id: rust-tests
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features

      - name: Generate scan results artifact
        if: always()
        run: |
          cat <<'EOF' > strike-results.json
          {
            "metadata": {
              "source": "ci",
              "duration_seconds": 0,
              "generated_at": "${{ github.run_id }}"
            },
            "findings": []
          }
          EOF

      - name: Generate HTML Report
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib, datetime
          data = json.load(open('strike-results.json'))
          findings = data.get('findings', [])
          rows = ''.join(
              f"<tr><td>{i+1}</td><td>{f.get('title','')}</td><td>{f.get('severity','')}</td></tr>"
              for i, f in enumerate(findings)
          ) or '<tr><td colspan="3">No findings</td></tr>'
          html = f"""<!DOCTYPE html><html><head><meta charset='utf-8'>
          <title>Strike Report</title>
          <style>body{{font-family:Arial;padding:24px}}table{{width:100%;border-collapse:collapse}}td,th{{border:1px solid #ddd;padding:8px}}</style>
          </head><body>
          <h1>Strike CI Report</h1>
          <p>Generated {datetime.datetime.utcnow()} UTC for run {data['metadata']['generated_at']}.</p>
          <table><thead><tr><th>#</th><th>Title</th><th>Severity</th></tr></thead><tbody>{rows}</tbody></table>
          </body></html>"""
          pathlib.Path('strike-report.html').write_text(html, encoding='utf-8')
          PY

      - name: Generate SARIF Report
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib
          results = []
          data = json.load(open('strike-results.json'))
          for f in data.get('findings', []):
              results.append({
                  "ruleId": f.get('id', 'STRIKE-0'),
                  "level": f.get('severity', 'note'),
                  "message": {"text": f.get('title', '')},
              })
          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "Strike", "version": "0.2.0"}},
                  "results": results,
              }]
          }
          pathlib.Path('strike-results.sarif').write_text(json.dumps(sarif, indent=2))
          PY

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: strike-results.sarif
          category: strike-security
      
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strike-security-report
          path: |
            strike-report.html
            strike-results.json
          retention-days: 30
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('strike-results.json', 'utf8'));
            
            const critical = results.findings.filter(f => f.severity === 'Critical').length;
            const high = results.findings.filter(f => f.severity === 'High').length;
            const medium = results.findings.filter(f => f.severity === 'Medium').length;
            const low = results.findings.filter(f => f.severity === 'Low').length;
            
            const comment = `## 🔒 Strike Security Scan Results
            
            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${critical} |
            | 🟠 High | ${high} |
            | 🟡 Medium | ${medium} |
            | 🟢 Low | ${low} |
            
            **Total Findings:** ${results.findings.length}
            **Scan Duration:** ${results.metadata.duration_seconds}s
            
            [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Check Security Threshold
        if: always()
        run: |
          CRITICAL=$(jq '[.findings[] | select(.severity == "Critical")] | length' strike-results.json)
          HIGH=$(jq '[.findings[] | select(.severity == "High")] | length' strike-results.json)
          
          echo "Critical findings: $CRITICAL"
          echo "High findings: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi
          
          if [ "$HIGH" -gt 5 ]; then
            echo "⚠️  Too many high severity findings!"
            exit 1
          fi
          
          echo "✅ Security scan passed!"

  incremental-scan:
    name: Incremental Checks (Changed Files Only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **/*.rs
            **/*.toml
            src/**
      
      - name: Setup Rust
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Run incremental checks
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
