target = "https://example.com"
env = "local"
profile = "full"
workers = 16
rate_limit = 50

[llm]
provider = "anthropic"
model = "claude-sonnet-4-6"
max_tokens_per_agent = 4096

[sandbox]
driver = "docker"
network_allowlist = ["https://example.com"]

[output]
dir = "./.strike/runs"
formats = ["json", "md", "sarif"]
